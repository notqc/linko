name: linko
description: Offline P2P chat with RSA encryption, PIN verification and mesh relay.
version: 2.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  nearby_connections: ^4.3.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  sqflite: ^2.3.3
  path: ^1.9.0
  pointycastle: ^3.9.1
  convert: ^3.1.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true


